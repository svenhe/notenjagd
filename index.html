<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Notenjagd – Notenlernspiel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app">

  <!-- ======== Einstellungen ======== -->
  <section id="scrSettings" class="screen active">
    <header class="titlebar">
      <h1>🎼 Notenjagd</h1>
      <p class="sub">Noten lesen üben – mit Gesang, Klavier oder Bildschirm‑Tasten</p>
    </header>

    <div class="card">
      <div class="field">
        <label>Notenschlüssel</label>
        <div class="seg" data-setting="clef">
          <button data-val="treble">Violin&shy;schlüssel</button>
          <button data-val="bass">Bass&shy;schlüssel</button>
          <button data-val="both">Beide</button>
        </div>
      </div>

      <div class="field">
        <label for="selKey">Tonart</label>
        <select id="selKey"></select>
      </div>

      <div class="field">
        <label>Tonumfang</label>
        <div class="seg" data-setting="range">
          <button data-val="klein">Ohne Hilfs&shy;linien</button>
          <button data-val="mittel">1 Hilfs&shy;linie</button>
          <button data-val="gross">2 Hilfs&shy;linien</button>
        </div>
      </div>

      <div class="field">
        <label for="selDur">Spieldauer</label>
        <select id="selDur">
          <option value="30">30 Sekunden</option>
          <option value="60" selected>1 Minute</option>
          <option value="90">90 Sekunden</option>
          <option value="120">2 Minuten</option>
          <option value="180">3 Minuten</option>
          <option value="300">5 Minuten</option>
        </select>
      </div>

      <div class="field">
        <label>Eingabe</label>
        <div class="seg" data-setting="input">
          <button data-val="mic">Mikrofon</button>
          <button data-val="tap">Tasten</button>
          <button data-val="both">Beides</button>
        </div>
      </div>

      <div class="field" id="fieldSens">
        <label>Mikrofon‑Empfindlichkeit</label>
        <div class="seg" data-setting="sens">
          <button data-val="hoch">Hoch</button>
          <button data-val="mittel">Mittel</button>
          <button data-val="niedrig">Niedrig</button>
        </div>
      </div>

      <div class="field" id="fieldTune">
        <label>Stimmung (Kammerton a′)</label>
        <div class="tunerow">
          <input type="number" id="inpA4" min="392" max="466" step="0.1">
          <span class="unit">Hz</span>
          <button type="button" id="btnCalib" class="mid">🎹 C einspielen</button>
          <button type="button" id="btnTuneReset" class="mid">440</button>
        </div>
      </div>

      <label class="check"><input type="checkbox" id="chkPlay"> Ton auch vorspielen 🔊</label>
      <label class="check"><input type="checkbox" id="chkOct"> Oktave muss stimmen</label>
    </div>

    <div id="rekordLine" class="rekord"></div>
    <button id="btnStart" class="big">▶&nbsp; Spiel starten</button>
    <p class="hint">Beim ersten Start bitte den Mikrofon‑Zugriff erlauben.<br>Am besten in Chrome öffnen – funktioniert auch auf Android.</p>
  </section>

  <!-- ======== Spiel ======== -->
  <section id="scrGame" class="screen">
    <div class="topbar">
      <button id="btnQuit" title="Beenden">✕</button>
      <div class="scorebox"><span id="score">0</span><span class="lbl">Punkte</span></div>
      <div class="timebox">
        <span id="timeTxt">1:00</span>
        <div class="timebar"><div id="timeFill"></div></div>
      </div>
    </div>

    <div id="staffCard" class="staffcard">
      <div id="staff"></div>
      <div id="flash" class="flash"></div>
    </div>

    <div class="underrow">
      <button id="btnReplay" class="mid hidden">🔊 Ton anhören</button>
      <div id="feedback" class="feedback"></div>
    </div>

    <div id="tuner" class="tuner">
      <div class="heard"><span id="heardName">–</span></div>
      <div class="needletrack"><div class="centermark"></div><div id="needle"></div></div>
      <div class="level"><div id="levelFill"></div></div>
    </div>

    <div id="piano" class="piano hidden"></div>
  </section>

  <!-- ======== Ergebnis ======== -->
  <section id="scrEnd" class="screen">
    <div class="card center">
      <h2>⏱ Zeit um!</h2>
      <div id="endScore" class="endscore">0</div>
      <div class="endlbl">Punkte</div>
      <div id="endStats" class="endstats"></div>
      <div id="endRekord" class="endrekord"></div>
      <button id="btnAgain" class="big">🔁 Nochmal spielen</button>
      <button id="btnToSettings" class="mid wide">⚙ Einstellungen</button>
    </div>
  </section>

  <div id="overlay" class="overlay hidden"><div id="overlayTxt">3</div></div>
  <div id="toast" class="toast hidden"></div>
</main>

<script src="js/vexflow.js"></script>
<script src="js/theory.js"></script>
<script src="js/sound.js"></script>
<script src="js/pitch.js"></script>
<script src="js/notation.js"></script>
<script src="js/game.js"></script>
</body>
</html>
